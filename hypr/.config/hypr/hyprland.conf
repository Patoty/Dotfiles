
# set monitors to workspaces
workspace=10,monitor:eDP-1, persistent:true, default:true
workspace=3,monitor:desc:HKC OVERSEAS LIMITED 27E1QA 0000000000001, persistent:true
workspace=8,monitor:desc:AOC 2460G5 0x0000FA96, persistent:true

# Monitor config
monitor=,preferred,auto,1
monitor = eDP-1,1920x1080,auto,1.333333
monitor = desc:HKC OVERSEAS LIMITED 27E1QA 0000000000001,2560x1440@60,1080x280,1.25
monitor = desc:AOC 2460G5 0x0000FA96,1920x1080,0x0,1,transform,1

# Move workspaces between monitors
bind = $mainMod CTRL, L, movecurrentworkspacetomonitor, +1
bind = $mainMod CTRL, H, movecurrentworkspacetomonitor, -1

# Clamshell configuration
bindl = ,switch:off:Lid Switch,exec,~/.config/hypr/lid.sh open
bindl = ,switch:on:Lid Switch,exec,~/.config/hypr/lid.sh close


# Execute startup applications
#########exec-once=waybar 
exec = ~/.config/waybar/launch.sh
#exec-once hyprpaper
exec-once = flatpak run com.synology.SynologyDrive 
exec-once = nm-applet
#exec = swaybg -i ~/Pictures/Wallpapers/landscape-car2.jpg -m fill
#exec = swaybg -i ~/Pictures/Wallpapers/landscape15.jpg -m fill
exec = swaybg -i ~/Pictures/Wallpapers/GBS/space-sloth-1.jpg -m fill
# For applications to elevate their privileges
exec-once = /usr/lib/polkit-1/polkit-agent-helper-1
windowrulev2 = float,class:^(org.kde.polkit-kde-authentication-agent-1)$

# source a config fil
#source = ~/.config/hypr/...

# Set default applications
#$terminal = kitty
$terminal = alacritty 
$fileManager = dolphin
$menu = wofi --show drun

# default env vars
env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt5ct # change to qt6ct if have that

# input configuration
input {
	kb_layout = de
	kb_variant =
	kb_model =
	kb_options = caps:escape
	kb_rules =

	follow_mouse = 1

	touchpad {
		natural_scroll = true
	}

	sensitivity = 0 # from -1,0 until 1.0, 0 means no modifiaction
}

# Xwayland config
xwayland {
	force_zero_scaling = true
}

env = GDK_SCALE,1.25
env = XCURSOR_Size, 15

# general config (see configuring/variables)
general {
	gaps_in = 5
	gaps_out = 5
	border_size = 2
	col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
	col.inactive_border = rgba(595959aa)

	layout = dwindle

	#see configuration/tearing before turning on:
	allow_tearing =false
}

decoration {
	rounding = 6

	blur {
		enabled = true
		size = 3
		passes = 1

		vibrancy = 0.1696
	}

	drop_shadow = true
	shadow_range = 4
	shadow_render_power = 3
	col.shadow = rgba(1a1a1aee)

}

animations {
	enabled = true
	
	# Some default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

dwindle {
    # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
    pseudotile = true # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # you probably want this
}

master {
    # See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
    new_is_master = true
}

gestures {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    workspace_swipe = true 
	workspace_swipe_fingers = 3
}

misc {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

device {
	name = logitech-g604--1
	natural_scroll =  false
}

device {
	name = tpps/2-elan-trackpoint
	natural_scroll = false 
}

# Example windowrule v1
# windowrule = float, ^(kitty)$
# Example windowrule v2
# windowrulev2 = float,class:^(kitty)$,title:^(kitty)$
# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
windowrulev2 = suppressevent maximize, class:.* # You'll probably like this.


# See https://wiki.hyprland.org/Configuring/Keywords/ for more
$mainMod = SUPER
$left = H
$down = J
$up = K
$right = L

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, RETURN, exec, $terminal
#bind = $mainMod SHIFT, RETURN, exec, $terminal ranger
bind = $mainMod SHIFT, RETURN, exec, $terminal -e ranger
bind = $mainMod, Q, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, D, togglefloating,
bind = $mainMod, SPACE, exec, $menu
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, O, togglesplit, # dwindle
bind = $mainMod, F, fullscreen
bind = $mainMod SHIFT, T, togglegroup

# Screenshots
bind = , Print, exec, slurp | grim -g - - | wl-copy
bind = $mainMod SHIFT, S, exec, slurp | grim -g - - | wl-copy

# Screen brightness
bind = , xf86monbrightnessup, exec, brightnessctl set 5%+
bind = , xf86monbrightnessdown, exec, brightnessctl set 5%-

# Volume control
bind = , xf86audioraisevolume, exec, wpctl set-volume -l 1.0 @DEFAULT_SINK@ 5%+
bind = , xf86audiolowervolume, exec, wpctl set-volume -l 1.0 @DEFAULT_SINK@ 5%-
bind = , xf86audiomute, exec, wpctl set-mute @DEFAULT_SINK@ toggle
bind = , xf86audiomicmute, exec, wpctl set-mute @DEFAULT_SOURCE@ toggle

# Screensaver and lock screen
$lock = swaylock -f --color 1e1e2eFF -i ~/Pictures/Wallpapers/GBS/space-sloth-1.jpg
exec-once = swayidle -w timeout 300 '$lock' timeout 300 'hyprctl dispatch dpms off' resume 'hyprctl dispatch dpms on' before-sleep '$lock'

# Screenlock
bind = $mainMod SHIFT, Q, exec, $lock


# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Move focus with mainMod + hjkl
bind = $mainMod, $left, movefocus, l
bind = $mainMod, $right, movefocus, r
bind = $mainMod, $up, movefocus, u
bind = $mainMod, $down, movefocus, d

# Move windows with mainMod Shift arrow-keys
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Move windows with mainMod Shift hjkl
bind = $mainMod SHIFT, $left, movewindow, l
bind = $mainMod SHIFT, $right, movewindow, r
bind = $mainMod SHIFT, $up, movewindow, u
bind = $mainMod SHIFT, $down, movewindow, d

# Resize windows with mainmod Ctrl + arrow keys
bind = $mainMod CTRL, left, resizeactive, -10 0
bind = $mainMod CTRL, right, resizeactive, 10 0
bind = $mainMod CTRL, up, resizeactive, 0 -10 
bind = $mainMod CTRL, down, resizeactive, 0 10

# Resize windows with mainmod Ctrl + hjkl
bind = $mainMod CTRL, $left, resizeactive, -10 0
bind = $mainMod CTRL, $right, resizeactive, 10 0
bind = $mainMod CTRL, $up, resizeactive, 0 -10 
bind = $mainMod CTRL, $down, resizeactive, 0 10

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10
bind = $mainMod, F1, workspace, 11
bind = $mainMod, F2, workspace, 12
bind = $mainMod, F3, workspace, 13
bind = $mainMod, F4, workspace, 14
bind = $mainMod, F5, workspace, 15
bind = $mainMod, F6, workspace, 16
bind = $mainMod, F7, workspace, 17
bind = $mainMod, F8, workspace, 18
bind = $mainMod, F9, workspace, 19

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10
bind = $mainMod SHIFT, F1, movetoworkspace, 11
bind = $mainMod SHIFT, F2, movetoworkspace, 12
bind = $mainMod SHIFT, F3, movetoworkspace, 13
bind = $mainMod SHIFT, F4, movetoworkspace, 14
bind = $mainMod SHIFT, F5, movetoworkspace, 15
bind = $mainMod SHIFT, F6, movetoworkspace, 16
bind = $mainMod SHIFT, F7, movetoworkspace, 17
bind = $mainMod SHIFT, F8, movetoworkspace, 18
bind = $mainMod SHIFT, F9, movetoworkspace, 19

# Example special workspace (scratchpad)
bind = $mainMod, X, togglespecialworkspace, magic
bind = $mainMod SHIFT, X, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
